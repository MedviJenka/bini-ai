name: bini_mcp

services:

  mcp_dashboard:
    container_name: mcp_dashboard
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
    ports:
      - "6274:6274"
      - "6277:6277"
    depends_on:
      mcp_service:
        condition: service_healthy
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:6274', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


  mcp_service:
    container_name: mcp_service
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp_service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
      LOG_LEVEL: DEBUG
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8082), timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      app: bini
      component: mcp
      env: development

networks:
  mcp-network:
#    driver: bridge
