[project]
name = "bini"
version = "0.1.0"
description = "Bini app"
authors = [{ name = "Jenia", email = "evgeny.petrusenko@audiocodes.com" }]
readme = "README.md"
requires-python = ">=3.12,<3.13"


dependencies = [
    "crewai",
    "crewai[tools]",
    "crewai-tools[mcp]",
    "crewai[azure-ai-inference]",
    "crewai[anthropic]",
    "mcp",
    "fastmcp",
    "mcp-agent",
    "mcpadapt",
    "python-dotenv",
    "requests",
    "fastapi",
    "python-multipart",
    "uvicorn",
    "pydantic",
    "aiohttp",
    "aiofiles",
    "logfire",
    "pytest",
    "pydantic-settings",
    "allure-pytest",
    "azure-identity",
    "azure-mgmt-monitor",
    "azure-mgmt-cognitiveservices",
    "azure-keyvault",
    "azure-mgmt-consumption>=10.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-xdist>=3.8.0",
    "pytest-repeat>=0.9.4",
    "google-speech>=1.2.0",
    "google>=3.0.0",
    "azure-cognitiveservices-speech>=1.47.0",
    "playwright>=1.58.0",
    "langchain-openai>=1.1.12",
]


[tool.uv]
required-environments = [
    "sys_platform == 'win32' and platform_machine == 'AMD64'",
]

[tool.hatch.build.targets.wheel]
packages = ["backend"]
