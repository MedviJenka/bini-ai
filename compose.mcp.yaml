name: bini_mcp

services:

  mcp_service:
    container_name: mcp_service
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp_service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
      LOG_LEVEL: DEBUG
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8082), timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      app: bini
      component: mcp
      env: development

networks:
  mcp-network:
    driver: bridge
