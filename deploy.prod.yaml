services:

  bini_service:
    image: biniai.azurecr.io/bini/bini-service:latest
    ports:
      - target: 8081
        published: 8081
        mode: ingress
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
      LOG_LEVEL: DEBUG
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    networks:
      - production-network
      - monitoring-network
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


networks:
  production-network:
    external: true
    driver: overlay
  monitoring-network:
    external: true
    driver: overlay


volumes:
  shared:
  jenkins:

