global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: 'bini-monitor'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['monitoring_prometheus_service:9090']

  # Bini Service
  - job_name: 'bini-service'
    static_configs:
      - targets: ['production_bini_service:8081']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 30s
