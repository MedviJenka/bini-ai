apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bini-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://bini.app"
    # TLS is terminated at the AWS NLB using ACM — no cert-manager or tls: block needed.
    # ssl-redirect is omitted: NLB does not forward X-Forwarded-Proto.
spec:
  ingressClassName: nginx
  rules:
    - host: bini.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bini-service
                port:
                  number: 6000
