apiVersion: apps/v1
kind: Deployment
metadata:
  name: bini-service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bini
      component: service
  template:
    metadata:
      labels:
        app: bini
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: bini-service
          image: ghcr.io/medvijenka/bini/bini-service:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          command: ["/app/.venv/bin/fastmcp", "run", "main.py:mcp", "--transport", "streamable-http", "--host", "0.0.0.0", "--port", "6000"]
          envFrom:
            - secretRef:
                name: env
          env:
            - name: UV_CACHE_DIR
              value: /tmp/uv-cache
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - name: http
              containerPort: 6000
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: bini-service
spec:
  type: ClusterIP
  selector:
    app: bini
    component: service
  ports:
    - name: http
      port: 6000
      targetPort: http
