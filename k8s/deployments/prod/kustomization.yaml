apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
  - ../../schemas
  - ../../monitoring

labels:
  - pairs:
      env: prod
    includeSelectors: false
    includeTemplates: true

replicas:
  - name: bini-service
    count: 2

images:
  - name: ghcr.io/medvijenka/bini/bini_service
    newTag: v1.0.0
