apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bini

resources:
  - ../../schemas
  - ../../monitoring

labels:
  - pairs:
      env: dev
    includeSelectors: false
    includeTemplates: true

replicas:
  - name: bini-service
    count: 1

patches:
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: bini-ingress
