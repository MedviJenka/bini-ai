extract_elements:
  agent: agent
  description: |
    Analyze the provided HTML content and extract all relevant UI elements.
    Identify each element’s structural and semantic attributes and convert the results
    into a normalized CSV-friendly structure.

    HTML Content:
    
    {content}

    Rules (Strict):
    - Focus on interactive and meaningful UI elements (buttons, inputs, links, labels, icons).
    - Capture element hierarchy only when it adds context.
    - Ignore scripts, styles, and non-UI metadata.
    - Normalize missing attributes as empty values.
    - Do NOT infer data that is not explicitly present in the HTML.
    - Do NOT include explanations or commentary.
    - under element_type use ID NAME, CSS or XPATH

  expected_output: |
    A valid CSV file with the specified columns: name, element_type, element_attribute


write_csv:
  agent: agent
  description: |
    You are given a validated list of UI elements extracted from a single HTML page.

    Each item strictly follows the PageBaseCSVElementSchema:
    - element_name
    - element_type
    - element_attribute

    Your task is to write these elements into a CSV file. file name: {filename}, directory: {directory}

    Input:
    - elements: a list of validated PageBaseCSVElementSchema objects
    - filename: the target CSV file name

    Rules (Strict):
    - Write exactly ONE CSV file.
    - The CSV must contain the following headers, in this exact order:
        element_name,element_type,element_attribute
    - Each element must be written as a single row.
    - Preserve values exactly as received.
    - Do NOT add, remove, infer, normalize, or modify data.
    - Do NOT include explanations, comments, or extra text.
    - Do NOT generate markdown.
    - Output must be written using the FileWriterTool only.

  expected_output: A CSV file written to disk with the specified filename, containing one row per UI element.
  context: [extract_elements]
