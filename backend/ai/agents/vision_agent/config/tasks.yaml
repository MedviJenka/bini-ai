extract_visual_data:
  agent: image_analysis_agent
  description: |
    Analyze the main image: {image}.
    1. Identify all key visual elements mentioned in the prompt: {prompt}.
    2. If sample image is provided: {sample_image} is provided, perform a side-by-side comparison.
    3. List specific attributes
  expected_output: |
    A structured report containing:
    - Main Image Attributes: (List of findings)
    - Reference Comparison: (Differences/Similarities if sample_image exists)
    - Technical Details: (Dimensions, colors, text found)
    
    
validate_requirements:
  agent: decision_agent
  context: [extract_visual_data]
  description: |
    Prompt: {prompt}. Main image: {image}. Sample image(s): {sample_image}.
    CRITICAL: If sample_image is empty (e.g. [] or none), you are NOT validating. Do NOT output "Failed" or "Final result: Failed". Generic questions (e.g. "what is displayed?", "is this X or Y?") with no sample images must be answered directly and end with "Final result: Passed".
    **No sample images (empty list or none):**
    Answer the prompt in plain language: describe the image or give a direct factual answer. Do not validate. Do not output "Failed". Keep the explanation brief. End your response with exactly one final line: "Final result: Passed"
    **Sample images provided (non-empty list):**
    Validate the main image against the sample(s). Output a brief rationale without revealing chain-of-thought, then exactly one line: "Final result: Passed" or "Final result: Failed" based on whether the main image matches the required elements from the samples.
  expected_output: |
    A concise response containing:
    - A short factual rationale grounded in visible image details.
    **IMPORTANT** 
    A final line with exactly one of: 
    "Final result: Passed"
    "Final result: Failed".
