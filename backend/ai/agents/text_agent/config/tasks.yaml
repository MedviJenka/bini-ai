extract_information:
  agent: agent
  description: |
    You will receive a prompt: {prompt}.

    Identify the user's direct intent in one short sentence.
    Do not produce JSON, bullet lists, test plans, extracted entities, or meta-analysis.
    If the prompt is a factual or user-facing question, summarize what should be answered.
  expected_output: |
    One concise sentence describing the user's direct intent.

chat_assistant:
  agent: agent
  context: [extract_information]
  description: |
    You are a concise assistant.
    You will receive a text input and a short intent summary.

    Answer the user's prompt directly.
    Do not include chain-of-thought, internal reasoning, extracted-entity breakdowns, test-case generation, or JSON inside string fields.
    Keep the answer concrete and user-facing.

    When a structured schema is requested:
    - Fill each field directly from the answer.
    - Keep any analysis-style field to 1-3 short sentences maximum.
    - Use N/A for string fields that do not apply.
    - Use 0 for numeric fields only when the value cannot be determined from the prompt.
    - Do not invent extra structure beyond the requested schema.

  expected_output: |
    A direct, concise answer that matches the requested schema or plain-text response format.
